<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkflowMax OAuth</title>
  <!--
    Deploy BOTH files to the same folder on GitHub Pages, e.g. redirecting-sk/
      → index.html   (this file, rename if needed)
      → oauth-redirect.js   (copy from oauth_redirect_github.example.js)

    CSP on some sites blocks inline script; external JS avoids a blank page.
  -->
  <style>
    :root { color-scheme: light dark; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 1.5rem; max-width: 40rem; line-height: 1.5; }
    h1 { font-size: 1.125rem; font-weight: 600; margin: 0 0 0.5rem; }
    label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; margin: 0.85rem 0 0.35rem; }
    pre { font-family: ui-monospace, monospace; font-size: 0.7rem; background: #f1f5f9; color: #0f172a; padding: 0.65rem 0.75rem; border-radius: 8px; overflow-x: auto; word-break: break-all; margin: 0; border: 1px solid #e2e8f0; max-height: 12rem; overflow-y: auto; }
    textarea#fullUrl { font-family: ui-monospace, monospace; font-size: 0.65rem; width: 100%; box-sizing: border-box; min-height: 5rem; padding: 0.6rem 0.65rem; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; color: #0f172a; resize: vertical; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.45rem; }
    button { font: inherit; font-size: 0.875rem; font-weight: 500; padding: 0.45rem 0.75rem; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; }
    button:hover { background: #f8fafc; }
    button.primary { background: #172554; color: #fff; border-color: #172554; }
    button.primary:hover { background: #1e3a8a; }
    .err { color: #b91c1c; font-size: 0.875rem; margin: 0.75rem 0 0; }
    .hint { font-size: 0.8125rem; color: #64748b; margin: 0 0 1rem; }
    #boot { color: #64748b; font-size: 0.9rem; }
  </style>
  <script src="oauth-redirect.js" defer></script>
</head>
<body>
  <h1>Copy into Territory Instruments Admin</h1>
  <p class="hint">Prefer <strong>Copy for app</strong> (JSON). The app also accepts the full URL from the box below.</p>

  <p id="boot">Reading redirect…</p>

  <div id="ok" style="display:none">
    <label>Authorization code</label>
    <pre id="codeBox"></pre>
    <div class="row"><button type="button" id="btnCode">Copy code</button></div>
    <label>State</label>
    <pre id="stateBox"></pre>
    <div class="row">
      <button type="button" id="btnState">Copy state</button>
      <button type="button" class="primary" id="btnBundle">Copy for app</button>
    </div>
    <p class="hint">In the app: <strong>Paste from clipboard</strong> → <strong>Complete connection</strong>.</p>
  </div>

  <p id="bad" class="err" style="display:none"></p>

  <div id="urlRow" style="display:none">
    <label>Full callback URL (paste whole thing in the app if needed)</label>
    <textarea id="fullUrl" readonly rows="4" spellcheck="false"></textarea>
    <div class="row"><button type="button" id="btnFullUrl">Copy full URL</button></div>
  </div>

  <noscript>
    <p class="err">Enable JavaScript for copy buttons, or paste the entire address bar into the desktop app.</p>
  </noscript>
</body>
</html>
