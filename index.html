<script>
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get("code");
  const state = urlParams.get("state");
  const error = urlParams.get("error");

  if (error) {
    window.location.href = `http://localhost:3000/api/workflowmax/callback?error=${encodeURIComponent(error)}`;
  } else if (code && state) {
    window.location.href =
      // `http://localhost:3000/api/workflowmax/callback` +
     ` https://your-domain.com/api/workflowmax/callback` +
      `?code=${encodeURIComponent(code)}` +
      `&state=${encodeURIComponent(state)}`;
  } else {
    document.body.innerHTML = "<p>Authorization failed. Missing code/state.</p>";
  }
</script>
