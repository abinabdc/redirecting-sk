<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territory Instruments - OAuth Redirect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 255, 255, 0.9);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Authenticating with Xero...</h2>
        <div class="spinner"></div>
        <p>Redirecting you back to Territory Instruments Dashboard</p>
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        (function() {
            try {
                // Extract all parameters from the URL
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                // Check for OAuth errors
                if (error) {
                    showError(`OAuth Error: ${error}${errorDescription ? ' - ' + errorDescription : ''}`);
                    return;
                }

                // Ensure we have the authorization code
                if (!code) {
                    showError('No authorization code received from Xero');
                    return;
                }

                // Determine target URL
                // Priority:
                // 1. Production URL from state parameter (base64 encoded)
                // 2. Fragment identifier (#production=https://...)
                // 3. Localhost (default for development)
                let targetUrl = 'http://localhost:3000';

                // Try to get production URL from state (if encoded there)
                if (state) {
                    try {
                        // Check if state contains a URL marker
                        if (state.includes('produrl=')) {
                            const prodUrl = state.split('produrl=')[1].split('&')[0];
                            targetUrl = decodeURIComponent(prodUrl);
                        }
                    } catch (e) {
                        console.log('State does not contain production URL, using default');
                    }
                }

                // Try to get production URL from fragment identifier
                const fragment = window.location.hash.substring(1);
                if (fragment) {
                    const fragmentParams = new URLSearchParams(fragment);
                    const prodUrl = fragmentParams.get('production');
                    if (prodUrl) {
                        targetUrl = prodUrl;
                    }
                }

                // Try to detect if we're on production GitHub Pages
                // You can set this by adding #production=https://yourdomain.com to the URL
                if (window.location.hostname !== 'localhost' && !fragment) {
                    // If deployed and no explicit production URL, try common patterns
                    const hostname = window.location.hostname;
                    // If you have a custom domain or know your production URL, set it here
                    // targetUrl = 'https://yourdomain.com';
                    // For now, default to localhost
                }

                // Build the callback URL with all parameters
                const callbackUrl = new URL('/api/xero/callback', targetUrl);
                callbackUrl.searchParams.set('code', code);
                if (state) {
                    callbackUrl.searchParams.set('state', state);
                }

                // Add any other parameters that might be present
                urlParams.forEach((value, key) => {
                    if (key !== 'code' && key !== 'state') {
                        callbackUrl.searchParams.set(key, value);
                    }
                });

                console.log('Redirecting to:', callbackUrl.toString());
                
                // Redirect after a brief moment (better UX)
                setTimeout(() => {
                    window.location.href = callbackUrl.toString();
                }, 500);

            } catch (err) {
                showError('Failed to process OAuth callback: ' + err.message);
                console.error(err);
            }

            function showError(message) {
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
            }
        })();
    </script>
</body>
</html>
