<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Redirect</title>
</head>
<body style="font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem;">
  <p id="msg">Redirecting to the desktop app…</p>
  <p id="manual" style="display: none;">
    If nothing happens (Safari sometimes blocks auto-redirect from HTTPS to localhost),
    <a id="link" href="#">tap here to open the app callback</a>.
  </p>

  <script>
(function () {
  const q = new URLSearchParams(window.location.search);
  const code = q.get('code');
  const state = q.get('state');
  if (!code) {
    document.getElementById('msg').textContent = 'No authorization code in URL.';
    return;
  }
  // Must match WORKFLOWMAX_LOCAL_CALLBACK in your .env (default http://localhost:5000/callback).
  // Use "localhost" not "127.0.0.1" — Safari often shows "address is invalid" for 127.0.0.1 from GitHub Pages.
  const target = new URL('http://localhost:5000/callback');
  target.searchParams.set('code', code);
  if (state != null && state !== '') {
    target.searchParams.set('state', state);
  }
  const href = target.toString();
  const link = document.getElementById('link');
  link.href = href;
  document.getElementById('manual').style.display = 'block';
  window.location.replace(href);
})();
  </script>
</body>
</html>
